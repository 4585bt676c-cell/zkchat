<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-color-theme="gold">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>jinnyore的小花园</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
*::-webkit-scrollbar{display:none;width:0}
html{max-width:100vw}
body{font-family:"Noto Serif SC","STSong","Songti SC","SimSun",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow:hidden;transition:background .5s,color .5s}
::selection{background:rgba(var(--accent-rgb),.25);color:var(--text)}

:root{
  --accent:#c5a47e;--accent-rgb:197,164,126;--accent-dark:#b8936a;
  --bg:#0a0a14;--bg2:#12121e;--bg3:#1a1a2e;
  --text:#e0ddd5;--text2:#8c8c8c;--text3:#5c5c6e;
  --border:rgba(255,255,255,.05);--border2:rgba(255,255,255,.1);
  --card-bg:rgba(255,255,255,.025);--card-hover:rgba(255,255,255,.06);
  --msg-me-bg:rgba(var(--accent-rgb),.7);--msg-me-text:#fff;
  --msg-partner-bg:rgba(255,255,255,.05);--msg-partner-text:var(--text);
  --shadow:0 8px 32px rgba(0,0,0,.4);--radius:16px;--radius-sm:10px;
  --font-size:15px;--transition:all .25s cubic-bezier(.25,.8,.25,1);
}
html[data-theme="light"]{
  --bg:#f0ede8;--bg2:#fafafa;--bg3:#e8e5e0;
  --text:#2a2a2a;--text2:#787878;--text3:#b0b0b0;
  --border:rgba(0,0,0,.06);--border2:rgba(0,0,0,.1);
  --card-bg:rgba(0,0,0,.02);--card-hover:rgba(0,0,0,.04);
  --msg-me-bg:rgba(var(--accent-rgb),.8);--msg-me-text:#fff;
  --msg-partner-bg:#fff;--msg-partner-text:var(--text);
  --shadow:0 4px 16px rgba(0,0,0,.06);
}
html[data-color-theme="gold"]{--accent:#c5a47e;--accent-rgb:197,164,126;--accent-dark:#b8936a}
html[data-color-theme="blue"]{--accent:#7FA6CD;--accent-rgb:127,166,205;--accent-dark:#6b91b8}
html[data-color-theme="purple"]{--accent:#BB9EC7;--accent-rgb:187,158,199;--accent-dark:#a889b5}
html[data-color-theme="pink"]{--accent:#F4A6B3;--accent-rgb:244,166,179;--accent-dark:#e892a1}
html[data-color-theme="mono"]{--accent:#888;--accent-rgb:136,136,136;--accent-dark:#aaa}
html[data-color-theme="sunset"]{--accent:#FF9A8B;--accent-rgb:255,154,139;--accent-dark:#e67a6b}

.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.stars span{position:absolute;border-radius:50%;background:#fff;animation:twinkle 3s infinite alternate}
@keyframes twinkle{0%{opacity:.15;transform:scale(1)}100%{opacity:.85;transform:scale(1.3)}}
.glow-1,.glow-2{position:fixed;pointer-events:none;z-index:0;border-radius:50%}
.glow-1{width:600px;height:600px;background:radial-gradient(circle,rgba(var(--accent-rgb),.08) 0%,transparent 65%);top:10%;left:50%;transform:translateX(-50%)}
.glow-2{width:400px;height:400px;background:radial-gradient(circle,rgba(var(--accent-rgb),.05) 0%,transparent 65%);bottom:10%;right:5%}

/* ===== LAYOUT ===== */
.app{position:relative;z-index:1;display:flex;height:100dvh;min-height:100dvh;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}
.sidebar{width:60px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:6px;transition:width .3s,transform .3s;z-index:20;overflow:hidden}
.sidebar.collapsed{width:0;border-right:none;padding:0}



.sidebar-expand-btn{position:fixed;left:0;top:50%;transform:translateY(-50%);width:22px;height:60px;border-radius:0 8px 8px 0;border:1px solid var(--border2);border-left:none;background:var(--bg2);color:var(--text3);cursor:pointer;font-size:10px;display:none;z-index:25;transition:var(--transition)}
.sidebar-expand-btn:hover{color:var(--accent);border-color:rgba(var(--accent-rgb),.4);background:var(--bg3)}
.sidebar-expand-btn.show{display:flex;align-items:center;justify-content:center}
.nav-item{width:48px;height:48px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;font-size:10px;color:var(--text3);transition:var(--transition);border:1px solid transparent;position:relative}
.nav-item:hover{background:var(--card-hover);color:var(--text)}
.nav-item.active{background:rgba(var(--accent-rgb),.12);color:var(--accent);border-color:rgba(var(--accent-rgb),.2)}
.nav-item .nav-icon{font-size:20px;line-height:1}
.nav-item .nav-badge{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:#e74c3c;display:none}
.nav-item .nav-badge.show{display:block}











.main{flex:1;display:flex;flex-direction:column;min-width:0}
.header{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);z-index:10;flex-shrink:0;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.header-avatar{width:38px;height:38px;border-radius:50%;background:rgba(var(--accent-rgb),.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header-info{flex:1;min-width:0;cursor:pointer;position:relative}
.header-name{font-size:15px;font-weight:600;color:var(--text)}
.header-name::after{content:' ▾';font-size:10px;color:var(--text3)}
.header-status{font-size:11px;color:var(--accent);display:flex;align-items:center;gap:4px}
.header-status::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.header-actions{display:flex;gap:4px}
.header-actions button{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:14px;transition:var(--transition);display:flex;align-items:center;justify-content:center}
.header-actions button:hover{border-color:rgba(var(--accent-rgb),.4);color:var(--accent)}
.sidebar-toggle{display:none}
@media(max-width:768px){
  .sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;width:100%!important;height:56px;flex-direction:row;justify-content:space-around;padding:0 8px;gap:0;background:var(--bg2);border-right:none;border-top:1px solid var(--border);z-index:100}
  .sidebar.collapsed{height:0;border-top:none}
  .sidebar-toggle{display:flex}
  .nav-item{width:auto;height:44px;flex:1;font-size:9px;border-radius:8px;gap:1px}
  .nav-item .nav-icon{font-size:18px}
  .app{height:100dvh;padding-bottom:0}
  .main{padding-bottom:56px}
  .header{padding:10px 12px}
  .header-title{font-size:15px}
  .header-avatar{width:32px;height:32px;font-size:15px}
  .chat-area{padding:12px}
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
  .msg-row{max-width:90%}
  .input-bar{padding:8px 10px;gap:6px;margin-bottom:0}
  .input-bar button{width:34px;height:34px;font-size:14px}
  .input-wrap textarea{font-size:13px}
  .send-btn{width:34px!important;height:34px!important}
  .panel{width:95vw!important;max-height:85vh;padding:16px}
  .emoji-panel{max-height:260px;bottom:120px}
  .call-minibar{bottom:80px}
  .moments-compose{padding:10px 12px;bottom:56px}
  .header-actions{display:flex!important}
  #sidebar-toggle-btn{display:none!important}
}

.chat-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.msg-row{display:flex;gap:8px;max-width:85%;animation:msgIn .3s ease}
.msg-row.me{align-self:flex-end;flex-direction:row-reverse}
.msg-row.partner{align-self:flex-start}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.msg-row.me .msg-avatar{background:rgba(var(--accent-rgb),.3)}
.msg-row.partner .msg-avatar{background:rgba(255,255,255,.1)}
.msg-bubble{max-width:100%;padding:10px 14px;border-radius:18px;font-size:var(--font-size);line-height:1.6;word-break:break-word;position:relative}
.msg-row.me .msg-bubble{background:var(--msg-me-bg);color:var(--msg-me-text);border-bottom-right-radius:6px}
.msg-row.partner .msg-bubble{background:var(--msg-partner-bg);color:var(--msg-partner-text);border:1px solid var(--border);border-bottom-left-radius:6px}
.msg-row .msg-time{font-size:10px;color:var(--text3);margin-top:2px;padding:0 4px}
.msg-row.me .msg-time{text-align:right}
.msg-img{max-width:200px;max-height:200px;border-radius:12px;cursor:pointer;transition:var(--transition)}
.msg-img:hover{transform:scale(1.02)}
.msg-img-wrap{position:relative}
.msg-emoji-large{font-size:48px;line-height:1}

.typing-indicator{display:flex;align-items:center;gap:4px;padding:8px 16px;color:var(--text3);font-size:12px;align-self:flex-start}
.typing-dots{display:flex;gap:3px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:typingBounce 1.4s infinite ease-in-out}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,80%,100%{transform:scale(1);opacity:.3}40%{transform:scale(1.3);opacity:1}}

/* Input bar */
.input-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;z-index:10}
.input-bar button{width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:16px;transition:var(--transition);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.input-bar button:hover{border-color:rgba(var(--accent-rgb),.4);color:var(--accent)}
.input-bar button.active{background:rgba(var(--accent-rgb),.2);border-color:rgba(var(--accent-rgb),.4);color:var(--accent)}
.input-wrap{flex:1;position:relative}
.input-wrap textarea{width:100%;padding:9px 14px;border-radius:24px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;font-family:inherit;outline:none;resize:none;max-height:100px;line-height:1.5;transition:var(--transition)}
.input-wrap textarea:focus{border-color:rgba(var(--accent-rgb),.5);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.08)}
.send-btn{width:38px!important;height:38px!important;background:rgba(var(--accent-rgb),.8)!important;color:#fff!important;border:none!important;font-size:16px!important}
.send-btn:hover{background:rgba(var(--accent-rgb),1)!important}

/* Emoji panel */
.emoji-panel{position:absolute;bottom:60px;left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius) var(--radius) 0 0;z-index:30;display:none;max-height:320px;overflow:hidden;flex-direction:column;box-shadow:0 -4px 20px rgba(0,0,0,.3)}
.emoji-panel.open{display:flex}
.emoji-tabs{display:flex;border-bottom:1px solid var(--border)}
.emoji-tab{flex:1;padding:10px;text-align:center;font-size:13px;color:var(--text2);cursor:pointer;transition:var(--transition);border-bottom:2px solid transparent}
.emoji-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.emoji-content{flex:1;overflow-y:auto;padding:12px}
.emoji-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:8px}
.emoji-item{padding:6px 3px;border-radius:8px;cursor:pointer;text-align:center;font-size:13px;transition:var(--transition);border:1px solid transparent;line-height:1.3}
.emoji-item:hover{background:var(--card-hover);border-color:var(--border2)}
.emoji-item.emoji-image{padding:4px}
.emoji-item img{width:56px;height:56px;object-fit:contain;border-radius:6px}
.emoji-item .emoji-del{position:absolute;top:0;right:0;width:18px;height:18px;border-radius:50%;background:rgba(255,0,0,.7);color:#fff;font-size:10px;display:none;align-items:center;justify-content:center;cursor:pointer}
.emoji-item:hover .emoji-del{display:flex}
.emoji-add{display:flex;align-items:center;justify-content:center;border:1px dashed var(--border2);color:var(--text3);font-size:24px;min-height:56px}
.emoji-add:hover{border-color:rgba(var(--accent-rgb),.4);color:var(--accent)}
.emoji-add input{display:none}

/* Image preview */
.img-preview-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-preview-overlay img{max-width:90vw;max-height:90vh;border-radius:12px}

/* Overlay panels */
.overlay{position:fixed;inset:0;z-index:998;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.panel{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;width:min(400px,90vw);max-height:80vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.panel h3{font-size:17px;margin-bottom:16px;color:var(--text)}
.panel label{display:block;font-size:12px;color:var(--text3);margin-bottom:4px;margin-top:12px}
.panel input[type="text"],.panel select,.panel input[type="number"]{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:8px}
.panel input:focus,.panel select:focus{border-color:rgba(var(--accent-rgb),.5)}
.panel .btn-row{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap}
.delay-row{display:flex;gap:8px;align-items:center}
.delay-row input{width:80px!important;margin-bottom:0!important}
.delay-row select{width:70px!important;margin-bottom:0!important}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:1000;padding:10px 24px;border-radius:50px;background:rgba(var(--accent-rgb),.9);color:#fff;font-size:14px;font-family:inherit;pointer-events:none;opacity:0;transition:opacity .3s,transform .3s;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(4px)}

.btn{padding:7px 16px;border-radius:50px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;transition:var(--transition);white-space:nowrap}
.btn:hover{border-color:rgba(var(--accent-rgb),.4);color:var(--accent)}
.btn-accent{background:rgba(var(--accent-rgb),.8);color:#fff;border:none}
.btn-accent:hover{background:rgba(var(--accent-rgb),1);color:#fff}
.btn-danger{background:rgba(220,60,60,.15);border-color:rgba(220,60,60,.3);color:#e55}
.btn-danger:hover{background:rgba(220,60,60,.25);color:#f66}
.btn-sm{padding:4px 12px;font-size:11px}
.add-cards-panel textarea{width:100%;min-height:120px;padding:10px 14px;border-radius:12px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;font-family:inherit;outline:none;resize:vertical;line-height:1.8}
.add-cards-panel textarea:focus{border-color:rgba(var(--accent-rgb),.5)}
.add-cards-panel .hint{font-size:11px;color:var(--text3);margin-top:6px}
.add-cards-panel .result{font-size:13px;color:var(--accent);margin-top:8px;text-align:center}

/* Scroll to bottom button */
.scroll-bottom{position:absolute;bottom:80px;right:20px;width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.scroll-bottom.show{display:flex}

.char-dropdown{position:absolute;top:100%;left:0;margin-top:6px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:50;display:none;overflow:hidden}
.char-dropdown.open{display:block}
.char-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:var(--transition);font-size:14px;color:var(--text);border-bottom:1px solid var(--border)}
.char-item:hover{background:var(--card-hover)}
.char-item.active{background:rgba(var(--accent-rgb),.1);color:var(--accent)}
.char-item-dot{width:28px;height:28px;border-radius:50%;background:rgba(var(--accent-rgb),.2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.char-item-add{border-bottom:none;color:var(--text3);font-size:13px;justify-content:center}
.char-item-add:hover{color:var(--accent)}
.char-item-del{width:24px;height:24px;border-radius:50%;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:12px;margin-left:auto;display:none;align-items:center;justify-content:center}
.char-item:hover .char-item-del{display:flex}
.char-item-del:hover{color:#e55;background:rgba(220,60,60,.1)}

.mail-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:12px}
.mail-tab{flex:1;padding:10px;text-align:center;font-size:13px;color:var(--text2);cursor:pointer;transition:var(--transition);border-bottom:2px solid transparent}
.mail-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.mail-list{max-height:300px;overflow-y:auto}
.mail-item{padding:10px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:var(--transition);font-size:13px}
.mail-item:hover{background:var(--card-hover)}
.mail-item .mail-subject{font-weight:600;color:var(--text);margin-bottom:4px}
.mail-item .mail-meta{font-size:11px;color:var(--text3)}
.mail-item.unread{border-color:rgba(var(--accent-rgb),.3);background:rgba(var(--accent-rgb),.04)}
.mail-badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:6px}
.mail-body{padding:12px 0;font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap}
.mail-compose textarea{width:100%;min-height:100px;padding:10px 14px;border-radius:12px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;font-family:inherit;outline:none;resize:vertical;line-height:1.6}
.mail-compose textarea:focus{border-color:rgba(var(--accent-rgb),.5)}
.mail-compose label{display:block;font-size:12px;color:var(--text3);margin-bottom:4px}
.mail-compose input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:10px}

/* Red packet */
.redpack-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.redpack-overlay.open{opacity:1;pointer-events:all}
.redpack-card{width:280px;background:linear-gradient(180deg,#e6392e 0%,#c0392b 100%);border-radius:20px;padding:32px 24px;text-align:center;color:#ffd700;box-shadow:0 20px 60px rgba(230,57,46,.4);position:relative;overflow:hidden;animation:bounceIn .5s cubic-bezier(.22,1,.36,1)}
.redpack-card .rp-icon{font-size:64px;margin-bottom:12px;animation:rpBounce .6s infinite alternate}
.redpack-card .rp-title{font-size:20px;font-weight:700;letter-spacing:2px;margin-bottom:6px}
.redpack-card .rp-sub{font-size:13px;color:#ffcccb;margin-bottom:16px}
.redpack-card .rp-btn{display:inline-block;padding:10px 40px;border-radius:50px;background:#ffd700;color:#c0392b;font-weight:700;font-size:16px;cursor:pointer;border:none;transition:transform .2s}
.redpack-card .rp-btn:active{transform:scale(.95)}
.redpack-card .rp-amount{font-size:36px;font-weight:900;color:#ffd700;margin:12px 0}
.redpack-card .rp-opened{display:none}
.redpack-card.opened .rp-closed{display:none}
.redpack-card.opened .rp-opened{display:block}
@keyframes bounceIn{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes rpBounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}

/* Call screen */
.call-overlay{position:fixed;inset:0;z-index:1000;background:linear-gradient(180deg,#1a1a2e 0%,#0a0a14 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;gap:20px}
.call-overlay.open{opacity:1;pointer-events:all}
.call-avatar{width:100px;height:100px;border-radius:50%;background:rgba(var(--accent-rgb),.3);display:flex;align-items:center;justify-content:center;font-size:42px;animation:callPulse 2s infinite}
.call-name{font-size:22px;font-weight:600;color:var(--text)}
.call-status{font-size:14px;color:var(--accent)}
.call-timer{font-size:16px;color:var(--text3);font-family:monospace}
.call-bubble{background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:16px;padding:12px 18px;max-width:260px;text-align:center;font-size:14px;color:var(--text);animation:fadeInUp .5s ease;margin-top:10px}
.call-actions{display:flex;gap:24px;margin-top:20px}
.call-btn{width:56px;height:56px;border-radius:50%;border:none;font-size:24px;cursor:pointer;transition:transform .2s;display:flex;align-items:center;justify-content:center}
.call-btn:active{transform:scale(.9)}
.call-hangup{background:#e74c3c;color:#fff}
.call-pickup{background:#2ecc71;color:#fff}
.call-minimize-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.6);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.call-minimize-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.call-minibar{position:fixed;bottom:70px;left:50%;z-index:1001;background:var(--bg2);border:1px solid var(--border2);border-radius:24px;padding:8px 16px;display:none;align-items:center;gap:10px;cursor:grab;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:fadeInUp .3s ease;user-select:none;-webkit-user-select:none;touch-action:none}
.call-minibar:active{cursor:grabbing}
.call-minibar.dragging{cursor:grabbing;box-shadow:0 8px 24px rgba(0,0,0,.25);transition:none}
.call-minibar.show{display:flex}
.call-minibar .cm-avatar{width:28px;height:28px;border-radius:50%;background:rgba(var(--accent-rgb),.3);display:flex;align-items:center;justify-content:center;font-size:12px}
.call-minibar .cm-info{font-size:12px;color:var(--text)}
.call-minibar .cm-timer{font-size:11px;color:var(--accent);font-family:monospace}
.call-minibar .cm-hangup{width:28px;height:28px;border-radius:50%;background:#e74c3c;color:#fff;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
@keyframes callPulse{0%,100%{box-shadow:0 0 0 0 rgba(var(--accent-rgb),.3)}50%{box-shadow:0 0 0 20px rgba(var(--accent-rgb),0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Moments */
.moments-overlay{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s}
.moments-overlay.open{opacity:1;pointer-events:all}
.moments-header{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
.moments-header .mh-back{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.moments-header .mh-title{font-size:17px;font-weight:600;color:var(--text)}
.moments-body{flex:1;overflow-y:auto;padding:16px 20px}
.moments-post{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:14px;animation:msgIn .3s ease}
.moments-post .mp-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.moments-post .mp-avatar{width:36px;height:36px;border-radius:50%;background:rgba(var(--accent-rgb),.3);display:flex;align-items:center;justify-content:center;font-size:14px}
.moments-post .mp-name{font-weight:600;font-size:14px;color:var(--text)}
.moments-post .mp-time{font-size:11px;color:var(--text3);margin-left:auto}
.moments-post .mp-content{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:10px}
.moments-post .mp-img{max-width:100%;max-height:240px;border-radius:10px;margin-bottom:10px;cursor:pointer}
.moments-comment{background:var(--bg3);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:13px;color:var(--text2)}
.moments-comment .mc-name{color:var(--accent);font-weight:600;margin-right:6px}
.moments-compose{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;align-items:center;z-index:10}
.moments-compose textarea{flex:1;padding:8px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;font-family:inherit;outline:none;resize:none;max-height:60px}
.moments-compose .mc-send{width:38px;height:38px;border-radius:50%;background:rgba(var(--accent-rgb),.8);color:#fff;border:none;font-size:14px;cursor:pointer}
.moments-compose .mc-img-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

.empty-chat{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:12px;font-size:14px}
.empty-chat .empty-icon{font-size:56px;opacity:.3}

function timeStr(ts){ const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ===== IMAGE COMPRESSION =====
function compressImage(dataUrl,maxW,maxH,quality,callback){
  if(!maxW)maxW=300;if(!maxH)maxH=300;
  if(!quality&&quality!==0)quality=0.7;
  if(typeof quality==='function'){callback=quality;quality=0.7;}
  var img=new Image();
  img.onload=function(){
    var w=img.width,h=img.height;
    if(w<=maxW&&h<=maxH){callback(dataUrl);return;}
    var ratio=Math.min(maxW/w,maxH/h);
    var c=document.createElement('canvas');c.width=w*ratio;c.height=h*ratio;
    var ctx=c.getContext('2d');ctx.drawImage(img,0,0,c.width,c.height);
    callback(c.toDataURL('image/jpeg',quality));
  };
  img.onerror=function(){callback(dataUrl);};
  img.src=dataUrl;
}

// ===== INDEXEDDB =====
var db=null;
function openDB(cb){
  var req=indexedDB.open('zkchat',1);
  req.onupgradeneeded=function(e){e.target.result.createObjectStore('data');};
  req.onsuccess=function(e){db=e.target.result;if(cb)cb();};
  req.onerror=function(){db=null;if(cb)cb();};
}
function dbSet(key,val,cb){
  if(!db){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){toast('⚠️ 存储空间不足，请清理表情包或聊天记录');};if(cb)cb();return;}
  try{
    var tx=db.transaction('data','readwrite');
    var store=tx.objectStore('data');
    var req=store.put(val,key);
    tx.oncomplete=function(){if(cb)cb();};
    tx.onerror=tx.onabort=function(){
      toast('⚠️ 存储空间不足，请清理表情包或聊天记录');
      if(cb)cb();
    };
  }catch(e){toast('⚠️ 存储空间不足，请清理表情包或聊天记录');if(cb)cb();}
}
function dbGet(key,cb){
  if(!db){try{cb(JSON.parse(localStorage.getItem(key)||'null'));}catch(e){cb(null);}return;}
  try{var tx=db.transaction('data','readonly');var req=tx.objectStore('data').get(key);req.onsuccess=function(){cb(req.result!==undefined?req.result:JSON.parse(localStorage.getItem(key)||'null'));};req.onerror=function(){try{cb(JSON.parse(localStorage.getItem(key)||'null'));}catch(e){cb(null);}};}catch(e){try{cb(JSON.parse(localStorage.getItem(key)||'null'));}catch(e2){cb(null);}}
}

function init(){
  loadAll(function(){
    generateStars();
    renderChat();
    bindEvents();
    applyTheme();
    applyColor();
    updateHeader();
    updateMailBadge();
    checkPendingReplies();
    checkPendingComments();
    startProactiveEvents();
  });
}

function loadAll(cb){
  openDB(function(){
    // Try IndexedDB first, fallback to localStorage
    dbGet('zk-characters',function(ch){
      characters=ch||[];
      // Migrate old format from localStorage
      if(characters.length===0){
        try{
          var oldHistory=JSON.parse(localStorage.getItem('zk-chat-history')||'[]');
          var oldSettings=JSON.parse(localStorage.getItem('zk-chat-settings')||'{}');
          if(oldHistory.length>0||oldSettings.partnerName){
            characters.push({id:Date.now(),name:oldSettings.partnerName||'梦角',replyGroup:oldSettings.replyGroup||'',replyDelay:oldSettings.replyDelay||3,replyUnit:oldSettings.replyUnit||'s',chatHistory:oldHistory});
          }
        }catch(e){}
      }
      if(characters.length===0){characters.push({id:Date.now(),name:'梦角',replyGroup:'',replyDelay:3,replyUnit:'s',chatHistory:[]});}
      try{activeCharId=JSON.parse(localStorage.getItem('zk-active-char'));}catch(e){activeCharId=null;}
      if(!activeCharId||!getActiveChar()) activeCharId=characters[0].id;
      try{var s=JSON.parse(localStorage.getItem('zk-chat-settings')||'{}');if(s.theme)settings.theme=s.theme;if(s.color)settings.color=s.color;}catch(e){}
      dbGet('zk-emoji-library',function(em){customEmojis=em||[];});
      try{var cd=JSON.parse(localStorage.getItem('zk-card-data')||'null');if(cd){GROUPS.length=0;for(var i=0;i<cd.length;i++)GROUPS.push(cd[i]);}}catch(e){}
      if(cb)cb();
    });
  });
}

function updateHeader(){
  var c=getActiveChar();
  $('header-name').textContent=c?c.name:'梦角';
  $('header-avatar').textContent=c?c.name.charAt(0):'✦';
}

function saveAll(){
  // Small settings → localStorage; large data → IndexedDB
  localStorage.setItem('zk-active-char',JSON.stringify(activeCharId));
  localStorage.setItem('zk-chat-settings',JSON.stringify(settings));
  dbSet('zk-characters',characters);
  dbSet('zk-emoji-library',customEmojis);
}

// ===== ADD CARDS =====
function openAddCards(){
  var overlay=$('import-overlay'),panel=$('import-panel');
  var groupOpts='';
  for(var i=0;i<GROUPS.length;i++){
    groupOpts+='<option value="'+GROUPS[i].name.replace(/"/g,'&quot;')+'">'+GROUPS[i].name+' ('+GROUPS[i].items.length+'条)</option>';
  }
  panel.innerHTML=
    '<h3>＋ 新增字卡</h3>'+
    '<label>选择分组</label><select id="add-group">'+groupOpts+'</select>'+
    '<label style="margin-top:10px">或新建分组</label><input type="text" id="add-new-group" placeholder="输入新分组名（留空则加入上方分组）">'+
    '<div class="add-cards-panel"><label style="margin-top:10px">字卡内容（一行一条）</label><textarea id="add-cards-text" placeholder="粘贴字卡内容，一行一条..."></textarea><div class="hint">自动过滤重复字卡</div><div class="result" id="add-result"></div></div>'+
    '<div class="btn-row"><button class="btn" id="add-cancel-btn">取消</button><button class="btn btn-accent btn-sm" id="add-confirm-btn">确认添加</button></div>';
  overlay.classList.add('open');

  function close(){overlay.classList.remove('open');}
  $('add-cancel-btn').addEventListener('click',close);
  overlay.addEventListener('click',function(e){if(e.target===this)close();});

  $('add-confirm-btn').addEventListener('click',function(){
    var lines=$('add-cards-text').value.split('\n').map(function(l){return l.trim()}).filter(Boolean);
    if(lines.length===0){toast('请输入字卡内容');return;}
    var groupName=$('add-new-group').value.trim()||$('add-group').value;
    if(!groupName){toast('请选择或输入分组');return;}
    var group=GROUPS.find(function(g){return g.name===groupName;});
    if(!group){
      var colors=['#FFC542','#20C997','#FF6B6B','#51CF66','#FF8E53','#4DABF7','#5C7CFA','#FF922B','#748FFC','#38D9A9','#F783AC','#212529','#BB9EC7','#F4A6B3','#888','#FF9A8B'];
      group={name:groupName,color:colors[GROUPS.length%colors.length],items:[]};
      GROUPS.push(group);
    }
    // Dedup and add
    var existingSet={};for(var i=0;i<group.items.length;i++){existingSet[group.items[i]]=true;}
    var added=0;
    for(var i=0;i<lines.length;i++){
      if(!existingSet[lines[i]]){group.items.push(lines[i]);existingSet[lines[i]]=true;added++;}
    }
    localStorage.setItem('zk-card-data',JSON.stringify(GROUPS));
    renderSidebar();
    $('add-result').textContent='✓ 成功添加 '+added+' 条，跳过 '+(lines.length-added)+' 条重复';
    $('add-cards-text').value='';
    if(added>0){toast('✓ 已添加 '+added+' 条字卡到「'+groupName+'」');}
    // Don't close - allow more batch add
  });
}

// ===== CHAT RENDER =====
function renderChat(){
  var area=$('chat-area'),empty=$('empty-chat'),scrollBtn=$('scroll-bottom-btn');
  var children=area.children;
  for(var i=children.length-1;i>=0;i--){
    if(children[i]!==empty&&children[i]!==scrollBtn) area.removeChild(children[i]);
  }
  var ch=getActiveChar();var chatHistory=ch?ch.chatHistory:[];
  if(chatHistory.length===0){empty.style.display='flex';scrollBtn.classList.remove('show');return}
  empty.style.display='none';
  var frag=document.createDocumentFragment();
  for(var i=0;i<chatHistory.length;i++){
    var m=chatHistory[i],row=document.createElement('div');
    row.className='msg-row '+(m.sender==='me'?'me':'partner');
    var c=getActiveChar();
    var avatarHtml='<div class="msg-avatar">'+(m.sender==='me'?'我':(c?c.name.charAt(0):'?'))+'</div>';
    var bubbleHtml='';
    if(m.type==='text'){
      bubbleHtml='<div class="msg-bubble">'+escapeHtml(m.content)+'</div>';
    }else if(m.type==='image'){
      bubbleHtml='<div class="msg-img-wrap"><img class="msg-img" src="'+m.content+'" loading="lazy" onclick="previewImage(this.src)"></div>';
    }else if(m.type==='emoji'){
      if(m.content.startsWith('data:')){
        bubbleHtml='<div class="msg-img-wrap"><img class="msg-img" src="'+m.content+'" loading="lazy" onclick="previewImage(this.src)" style="max-width:120px;max-height:120px"></div>';
      }else{
        bubbleHtml='<div class="msg-emoji-large">'+m.content+'</div>';
      }
    }else if(m.type==='redpack'){
      if(m.status==='pending'&&m.sender==='partner'){
        bubbleHtml='<div class="msg-bubble" style="background:linear-gradient(135deg,#e6392e,#c0392b);color:#ffd700;min-width:160px;text-align:center"><div style="font-size:28px;margin-bottom:4px">🧧</div>'+escapeHtml((c?c.name:'')+' 发的红包')+'<div style="font-size:20px;font-weight:700;margin:6px 0">¥'+escapeHtml(m.content)+'</div><div style="display:flex;gap:6px;justify-content:center;margin-top:8px"><button class="rp-accept-btn" data-rid="'+m.id+'" style="padding:5px 16px;border-radius:12px;border:none;background:#ffd700;color:#c0392b;font-weight:700;cursor:pointer;font-size:13px">收下</button><button class="rp-reject-btn" data-rid="'+m.id+'" style="padding:5px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#ffcccb;cursor:pointer;font-size:12px">拒绝</button></div></div>';
      }else if(m.status==='accepted'){
        bubbleHtml='<div class="msg-bubble">🧧 红包 ¥'+escapeHtml(m.content)+' 已收下~ '+escapeHtml(m.reply||'')+'</div>';
      }else if(m.status==='rejected'){
        bubbleHtml='<div class="msg-bubble" style="opacity:.6">🧧 红包 ¥'+escapeHtml(m.content)+' 已退还</div>';
      }else{
        bubbleHtml='<div class="msg-bubble">🧧 红包 ¥'+escapeHtml(m.content)+'</div>';
      }
    }
    row.innerHTML=avatarHtml+bubbleHtml+'<div class="msg-time">'+timeStr(m.time)+'</div>';
    frag.appendChild(row);
  }
  area.insertBefore(frag,empty.nextSibling||null);
  scrollToBottom();
}

function scrollToBottom(){
  var area=$('chat-area');
  setTimeout(function(){ area.scrollTop=area.scrollHeight; },50);

// ===== REPLY LOGIC =====
function getRandomCard(){
  var c=getActiveChar(),pool=[];
  var replyGroup=c?c.replyGroup:'';
  if(replyGroup){
    for(var i=0;i<GROUPS.length;i++){
      if(GROUPS[i].name===replyGroup){pool=GROUPS[i].items;break;}
    }
  }
  if(pool.length===0){
    for(var i=0;i<GROUPS.length;i++){pool=pool.concat(GROUPS[i].items);}
  }
  if(pool.length===0) return '……';
  return pool[Math.floor(Math.random()*pool.length)];
}

function getRandomCards(min,max){
  if(!min)min=2;if(!max)max=5;
  var count=min+Math.floor(Math.random()*(max-min+1));
  var cards=[],used={};
  for(var i=0;i<count;i++){
    var card=getRandomCard();
    if(used[card]){i--;continue;}
    used[card]=true;cards.push(card);
  }
  return cards.join('；');
}

function triggerReply(){
  clearTimeout(replyTimer);
  var c=getActiveChar();
  var delay=(c?c.replyDelay:3)||3;
  if(c&&c.replyUnit==='m') delay*=60;
  delay*=1000;
  showTyping();
  replyTimer=setTimeout(function(){
    hideTyping();
    var roll=Math.random();
    if(roll<0.2&&customEmojis.length>0){
      var emoji=customEmojis[Math.floor(Math.random()*customEmojis.length)];
      addMessage('emoji',emoji.data,'partner');
    }else if(roll<0.35){
      var yw=GROUPS.find(function(g){return g.name==='颜文字';});
      if(yw&&yw.items.length>0){addMessage('text',yw.items[Math.floor(Math.random()*yw.items.length)],'partner');}
      else{addMessage('text',getRandomCard(),'partner');}
    }else{
      // 30% chance to quote-reply to user's last message
      var cc=getActiveChar();
      if(cc&&cc.chatHistory.length>0&&Math.random()<0.3){
        var lastMe=null;
        for(var i=cc.chatHistory.length-1;i>=0;i--){if(cc.chatHistory[i].sender==='me'){lastMe=cc.chatHistory[i];break;}}
        if(lastMe&&lastMe.type==='text'){
          var quote='> 我: '+lastMe.content+'\n'+getRandomCard();
          addMessage('text',quote,'partner');
          return;
        }
      }
      addMessage('text',getRandomCard(),'partner');
    }
  },delay);
}

// ===== SEND =====
function sendText(){
  try{
    var input=$('msg-input'),text=input.value.trim();
    if(!text) return;
    addMessage('text',text,'me');
    input.value='';input.style.height='auto';
    triggerReply();
  }catch(e){toast('发送失败: '+e.message);}
}

function sendImage(file){
  var reader=new FileReader();
  reader.onload=function(e){
    compressImage(e.target.result,400,400,function(compressed){
      addMessage('image',compressed,'me');
      triggerReply();
    });
  };
  reader.readAsDataURL(file);
}

function sendEmoji(content){
  addMessage('emoji',content,'me');
  closeEmojiPanel();
  triggerReply();
}

function uploadEmojis(files){
  if(!files||files.length===0) return;
  var total=files.length,loaded=0,failed=0;
  for(var i=0;i<files.length;i++){
    (function(file){
      // Check file type
      if(!file.type.match(/^image\//)){
        failed++;toast('⚠️ 跳过非图片文件: '+file.name);return;
      }
      var reader=new FileReader();
      reader.onload=function(e){
        compressImage(e.target.result,120,120,0.5,function(compressed){
          customEmojis.push({id:Date.now()+loaded,data:compressed,name:file.name});
          loaded++;checkDone();
        });
      };
      reader.onerror=function(){failed++;toast('⚠️ 读取失败: '+file.name);checkDone();};
      reader.readAsDataURL(file);
    })(files[i]);
  }
  function checkDone(){
    if(loaded+failed===total){
      dbSet('zk-emoji-library',customEmojis,function(){
        renderEmojiContent();
      });
      var msg='✓ 已添加 '+loaded+' 个';
      if(failed>0) msg+=', 跳过 '+failed+' 个';
      toast(msg);
    }
  }
}

function deleteEmoji(idx){
  customEmojis.splice(idx,1);
  dbSet('zk-emoji-library',customEmojis,function(){renderEmojiContent();});
}

function showCardImportDialog(groups){
  var overlay=$('import-overlay'),panel=$('import-panel');
  var totalItems=groups.reduce(function(s,g){return s+(g.items||[]).length},0);
  panel.innerHTML=
    '<h3>📥 导入字卡</h3>'+
    '<p>检测到 <strong>'+groups.length+'</strong> 个分组，共 <strong>'+totalItems+'</strong> 条字卡</p>'+
    '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px">'+
      '<button class="btn btn-accent" id="import-replace-btn">覆盖导入</button>'+
      '<button class="btn" id="import-append-btn">追加导入（自动去重）</button>'+
      '<button class="btn" id="import-cancel-btn">取消</button>'+
    '</div>';
  overlay.classList.add('open');

  function close(){overlay.classList.remove('open');}
  $('import-cancel-btn').addEventListener('click',close);
  overlay.addEventListener('click',function(e){if(e.target===this)close();});

  $('import-replace-btn').addEventListener('click',function(){
    if(!confirm('确定用导入的字卡完全覆盖当前字卡库？'))return;
    GROUPS.length=0;
    for(var i=0;i<groups.length;i++)GROUPS.push({name:groups[i].name,color:groups[i].color||'#888',items:(groups[i].items||[]).slice()});
    localStorage.setItem('zk-card-data',JSON.stringify(GROUPS));
    renderSidebar();
    close();
    toast('✓ 字卡已覆盖导入');
  });

  $('import-append-btn').addEventListener('click',function(){
    var added=0;
    for(var i=0;i<groups.length;i++){
      var g=groups[i],existing=GROUPS.find(function(eg){return eg.name===g.name;});
      if(existing){
        // Build a Set of existing items for O(1) dedup lookup
        var existingSet={};
        for(var k=0;k<existing.items.length;k++){existingSet[existing.items[k]]=true;}
        var newItems=g.items||[];
        for(var j=0;j<newItems.length;j++){
          if(!existingSet[newItems[j]]){existing.items.push(newItems[j]);existingSet[newItems[j]]=true;added++;}
        }
      }else{
        GROUPS.push({name:g.name,color:g.color||'#888',items:(g.items||[]).slice()});
        added+=(g.items||[]).length;
      }
    }
    localStorage.setItem('zk-card-data',JSON.stringify(GROUPS));
    renderSidebar();
    close();
    toast('✓ 追加完成，新增 '+added+' 条（已自动去重）');
  });
}

function downloadJSON(data,filename){
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
  toast('✓ 已下载 '+filename);
}

// ===== MAILBOX =====
function ensureLetters(){
  var c=getActiveChar();if(!c)return;
  if(!c.letters) c.letters=[];
}

function getUnreadCount(){
  var c=getActiveChar();if(!c||!c.letters)return 0;
  var n=0;for(var i=0;i<c.letters.length;i++){if(!c.letters[i].read)n++;}
  return n;
}

function openMailbox(){checkPendingReplies();renderMailbox();$('mail-overlay').classList.add('open');}

function renderMailbox(view){
  ensureLetters();
  var c=getActiveChar();var letters=c.letters||[];
  if(!view) view='inbox';
  var panel=$('mail-panel'),html='';
  html+='<div style="display:flex;align-items:center;justify-content:space-between"><h3>✉️ 信箱 — '+escapeHtml(c.name)+'</h3><button class="btn btn-sm" onclick="document.getElementById(\'mail-overlay\').classList.remove(\'open\')" style="font-size:16px">✕</button></div>';
  var inboxLetters=letters.filter(function(l){return l.direction==='received';});
  html+='<div class="mail-tabs"><div class="mail-tab'+(view==='inbox'?' active':'')+'" data-mail-tab="inbox">收件箱 ('+inboxLetters.length+')</div><div class="mail-tab'+(view==='compose'?' active':'')+'" data-mail-tab="compose">写信</div><div class="mail-tab'+(view==='sent'?' active':'')+'" data-mail-tab="sent">已发送</div></div>';

  if(view==='inbox'){
    if(inboxLetters.length===0){html+='<p style="text-align:center;color:var(--text3);padding:30px">📭 还没有收到信件</p>';}
    else{
      html+='<div class="mail-list">';
      for(var i=letters.length-1;i>=0;i--){
        var l=letters[i];if(l.direction!=='received')continue;
        html+='<div class="mail-item'+(l.read?'':' unread')+'" data-midx="'+i+'"><div class="mail-subject">'+escapeHtml(l.subject||'(无主题)')+(l.read?'':'<span class="mail-badge">新</span>')+'</div><div class="mail-meta">'+escapeHtml(l.from||'梦角')+' · '+new Date(l.time).toLocaleString('zh-CN')+'</div></div>';
      }
      html+='</div>';
    }
  }else if(view==='compose'){
    html+='<div class="mail-compose"><label>主题</label><input type="text" id="mail-subject" placeholder="信件主题…"><label>内容</label><textarea id="mail-body" placeholder="写下你想说的话…"></textarea><div class="btn-row"><button class="btn btn-accent btn-sm" id="mail-send-btn">📨 发送</button></div></div>';
  }else if(view==='sent'){
    var sent=letters.filter(function(l){return l.direction==='sent';});
    if(sent.length===0){html+='<p style="text-align:center;color:var(--text3);padding:30px">📨 还没有发送过信件</p>';}
    else{
      html+='<div class="mail-list">';
      for(var i=sent.length-1;i>=0;i--){
        var l=sent[i];html+='<div class="mail-item" data-midx="'+letters.indexOf(l)+'"><div class="mail-subject">'+escapeHtml(l.subject||'(无主题)')+'</div><div class="mail-meta">发给 '+escapeHtml(l.to||'梦角')+' · '+new Date(l.time).toLocaleString('zh-CN')+'</div></div>';
      }
      html+='</div>';
    }
  }
  panel.innerHTML=html;

  // Tab switching
  panel.querySelectorAll('.mail-tab').forEach(function(t){t.addEventListener('click',function(){renderMailbox(this.dataset.mailTab);});});

  // Click mail item to view
  panel.querySelectorAll('.mail-item').forEach(function(item){item.addEventListener('click',function(){
    var idx=parseInt(this.dataset.midx),l=letters[idx];
    l.read=true;saveAll();
    var detail='<h3>📧 '+escapeHtml(l.subject||'(无主题)')+'</h3>';
    detail+='<p style="font-size:12px;color:var(--text3);margin-bottom:12px">'+(l.direction==='sent'?'发给 '+escapeHtml(l.to||'梦角'):'来自 '+escapeHtml(l.from||'梦角'))+' · '+new Date(l.time).toLocaleString('zh-CN')+'</p>';
    detail+='<div class="mail-body">'+escapeHtml(l.body||'')+'</div>';
    detail+='<div class="btn-row"><button class="btn btn-sm" id="mail-back-btn">← 返回</button></div>';
    panel.innerHTML=detail;
    panel.querySelector('#mail-back-btn').addEventListener('click',function(){renderMailbox('inbox');});
    $('mail-btn').textContent='✉️';
  });});

  // Send mail
  var sendBtn=panel.querySelector('#mail-send-btn');
  if(sendBtn){sendBtn.addEventListener('click',function(){
    var subject=$('mail-subject').value.trim()||'(无主题)',body=$('mail-body').value.trim();
    if(!body){toast('请输入内容');return;}
    var delay=3600000+Math.random()*7200000; // 1-3 hours
    letters.push({subject:subject,body:body,time:Date.now(),from:'我',to:c.name,direction:'sent',read:true,replyDue:Date.now()+delay});
    saveAll();
    scheduleReply(delay,letters.length-1,subject,c.name);
    toast('✓ 信件已发送（对方将在1-3小时内回信）');
    renderMailbox('inbox');
    updateMailBadge();
  });}
}

function scheduleReply(delay,idx,subject,name){
  setTimeout(function(){
    deliverReply(idx,subject,name);
  },delay);
}

function deliverReply(idx,subject,name){
  var c=getActiveChar();if(!c||!c.letters||!c.letters[idx])return;
  if(c.letters[idx].replyDelivered)return;
  var count=1+Math.floor(Math.random()*Math.random()*60);
  c.letters.push({subject:'Re: '+subject,body:getRandomCards(1,count),time:Date.now(),from:name,to:'我',direction:'received',read:false});
  c.letters[idx].replyDelivered=true;
  saveAll();updateMailBadge();
  toast('📬 收到 '+name+' 的回信！');
}

function checkPendingReplies(){
  var c=getActiveChar();if(!c||!c.letters)return;
  var now=Date.now(),hasNew=false;
  for(var i=0;i<c.letters.length;i++){
    var l=c.letters[i];
    if(l.direction==='sent'&&l.replyDue&&!l.replyDelivered&&now>=l.replyDue){
      deliverReply(i,l.subject,c.name);hasNew=true;
    }else if(l.direction==='sent'&&l.replyDue&&!l.replyDelivered&&now<l.replyDue){
      scheduleReply(l.replyDue-now,i,l.subject,c.name);
    }
  }
  if(hasNew){saveAll();updateMailBadge();}
}

function updateMailBadge(){
  var n=getUnreadCount();
  var nb=document.getElementById('nav-mail-badge');
  if(nb){if(n>0)nb.classList.add('show');else nb.classList.remove('show');}
}

let proactiveTimer=null;
function startProactiveEvents(){
  clearInterval(proactiveTimer);
  proactiveTimer=setInterval(function(){
    var c=getActiveChar();if(!c)return;
    var roll=Math.random();
    if(roll<0.15){
      var amounts=['520','888','999','1314','8888','9999'];
      var amount=amounts[Math.floor(Math.random()*amounts.length)];
      c.chatHistory.push({id:Date.now(),type:'redpack',content:amount,sender:'partner',time:Date.now(),status:'pending'});
      saveAll();renderChat();
      var rpb=document.getElementById('nav-redpack-badge');if(rpb)rpb.classList.add('show');toast('🧧 '+(c.name)+' 给你发了一个红包！');
      setTimeout(function(){var b=document.getElementById('nav-redpack-badge');if(b)b.classList.remove('show');},30000);
    }else if(roll<0.3){
      // Check if 1-2 days since last character post
      var lastPost=0;
      ensureMoments();
      for(var j=c.moments.length-1;j>=0;j--){if(c.moments[j].from!=='我'){lastPost=c.moments[j].time;break;}}
      if(Date.now()-lastPost>86400000+Math.random()*86400000){
        c.moments.push({text:getRandomCards(1,3),img:null,from:c.name,time:Date.now(),comments:[]});
        saveAll();var mb=document.getElementById('nav-moments-badge');if(mb)mb.classList.add('show');toast('🌐 '+(c.name)+' 发了一条朋友圈');
        setTimeout(function(){var b=document.getElementById('nav-moments-badge');if(b)b.classList.remove('show');},30000);
      }
    }else if(roll<0.4){
      var cb=document.getElementById('nav-call-badge');if(cb)cb.classList.add('show');
      incomingCall();
      setTimeout(function(){var b=document.getElementById('nav-call-badge');if(b)b.classList.remove('show');},30000);
    }
  },45000+Math.random()*45000);
}

document.addEventListener('visibilitychange',function(){if(!document.hidden)startProactiveEvents();});

function declineCall(){

let callTimer=null, callSeconds=0, callBubbleInterval=null;

function openCall(){
  if(callActive){toast('已在通话中');return;}
  callActive=true;
  // Hide answer/decline buttons if visible
  var ca=document.getElementById('call-answer-btn'),cd=document.getElementById('call-decline-btn');
  if(ca)ca.style.display='none';if(cd)cd.style.display='none';
  $('call-minimize-btn').style.display='flex';$('call-hangup-btn').style.display='flex';
  var c=getActiveChar();
  $('call-avatar').textContent=c?c.name.charAt(0):'✦';
  $('call-name').textContent=c?c.name:'梦角';
  $('call-status').textContent='呼叫中…';
  $('call-status').style.display='block';
  $('call-timer').style.display='none';
  $('call-bubbles').innerHTML='';
  $('call-overlay').classList.add('open');

  // Simulate response after 2-4 seconds
  setTimeout(function(){
    var roll=Math.random();
    if(roll<0.1){
      // 10% no answer
      $('call-status').textContent='无人接听';
      setTimeout(function(){hangupCall();},1500);
      return;
    }else if(roll<0.2){
      // 10% decline
      $('call-status').textContent='对方已挂断';
      var c2=getActiveChar();if(c2){c2.chatHistory.push({id:Date.now(),type:'text',content:'📞 未接通话',sender:'partner',time:Date.now()});saveAll();renderChat();}
      setTimeout(function(){hangupCall();},1500);
      return;
    }
    // 80% answer
    $('call-status').textContent='通话中';
    callSeconds=0;
    $('call-timer').style.display='block';
    updateCallTimer();
    callTimer=setInterval(updateCallTimer,1000);

    // Show random cards as speech every 3-5 seconds
    function showCallBubble(){
      var card=getRandomCard(),b=document.createElement('div');
      b.className='call-bubble';b.textContent=card;
      $('call-bubbles').appendChild(b);
      if($('call-bubbles').children.length>4) $('call-bubbles').firstChild.remove();
    }
    showCallBubble();
    callBubbleInterval=setInterval(showCallBubble,3000+Math.random()*3000);
  },2000+Math.random()*2000);
}

function updateCallTimer(){
  callSeconds++;
  var m=Math.floor(callSeconds/60),s=callSeconds%60,ts=(m<10?'0'+m:m)+':'+(s<10?'0'+s:s);
  $('call-timer').textContent=ts;
  $('cm-timer').textContent=ts;
}

function hangupCall(){
  callActive=false;
  clearInterval(callTimer);clearInterval(callBubbleInterval);
  $('call-overlay').classList.remove('open');
  var mb=$('call-minibar');mb.classList.remove('show');
  mb.style.position='';mb.style.left='';mb.style.top='';mb.style.width='';mb.style.transform='';mb.style.transition='';
  toast('通话结束 ('+$('call-timer').textContent+')');
}

function minimizeCall(){
  $('call-overlay').classList.remove('open');
  var mb=$('call-minibar');mb.classList.add('show');
  // Reset position
  mb.style.position='';mb.style.left='';mb.style.top='';mb.style.width='';mb.style.transform='';mb.style.transition='';mb.style.transition='';
  var c=getActiveChar();$('cm-avatar').textContent=c?c.name.charAt(0):'✦';
  $('cm-info').textContent='与 '+(c?c.name:'')+' 通话中';
}

function restoreCall(){
  $('call-minibar').classList.remove('show');
  $('call-overlay').classList.add('open');
}

function ensureMoments(){

function openMoments(){
  ensureMoments();

function renderMoments(){
  var c=getActiveChar();var posts=c.moments||[];
  var body=$('moments-body'),html='';
  if(posts.length===0){
    html='<div style="text-align:center;color:var(--text3);padding:60px 20px"><div style="font-size:48px;opacity:.3;margin-bottom:12px">🌐</div>还没有动态<br><span style="font-size:12px">发第一条朋友圈吧</span></div>';
  }
  for(var i=posts.length-1;i>=0;i--){
    var p=posts[i],isMe=p.from==='我';
    html+='<div class="moments-post" data-pidx="'+i+'"><div class="mp-header"><div class="mp-avatar" style="'+(isMe?'':'background:rgba(var(--accent-rgb),.3)')+'">'+p.from.charAt(0)+'</div><div class="mp-name">'+escapeHtml(p.from)+'</div><div class="mp-time">'+new Date(p.time).toLocaleString('zh-CN')+'</div></div><div class="mp-content">'+escapeHtml(p.text||'')+'</div>';
    if(p.img){html+='<img class="mp-img" src="'+p.img+'" onclick="previewImage(this.src)">';}
    if(p.comments&&p.comments.length>0){
      for(var j=0;j<p.comments.length;j++){
        var cmt=p.comments[j];html+='<div class="moments-comment"><span class="mc-name">'+escapeHtml(cmt.from)+'</span>：'+escapeHtml(cmt.text)+'</div>';
      }
    }
    html+='<div class="moments-comment-box" style="display:flex;gap:6px;margin-top:8px"><input class="mp-comment-input" placeholder="写评论…" style="flex:1;padding:6px 10px;border-radius:14px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:12px;font-family:inherit;outline:none"><button class="btn btn-sm mp-comment-send" data-pidx="'+i+'">发送</button></div>';
    html+='</div>';
  }
  body.innerHTML=html;
  // Bind comment send buttons
  body.querySelectorAll('.mp-comment-send').forEach(function(btn){btn.addEventListener('click',function(){
    var cc=getActiveChar();if(!cc)return;
    var idx=parseInt(this.dataset.pidx),input=this.parentElement.querySelector('.mp-comment-input');
    var text=input.value.trim();if(!text||!cc.moments[idx])return;
    cc.moments[idx].comments.push({from:'我',text:text,time:Date.now()});
    saveAll();
    var selfIdx=idx,selfName=cc.name;
    setTimeout(function(){
      var c2=getActiveChar();if(!c2||!c2.moments[selfIdx])return;
      c2.moments[selfIdx].comments.push({from:selfName,text:getRandomCards(1,2),time:Date.now()});
      saveAll();if($('moments-overlay').classList.contains('open'))renderMoments();
    },2000+Math.random()*3000);
    renderMoments();
  });});
  // Enter key on comment input
  body.querySelectorAll('.mp-comment-input').forEach(function(inp){inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){var btn=this.parentElement.querySelector('.mp-comment-send');if(btn)btn.click();}
  });});
  body.scrollTop=body.scrollHeight;
}

function postMoment(text,img,from){

  var commentDue=Date.now()+3600000+Math.random()*3600000;
  c.moments.push({text:text,img:img||null,from:from,time:Date.now(),comments:[],commentDue:commentDue});

  checkPendingComments();
}

function deliverComment(post){
  var c=getActiveChar();if(!c||post.commentDelivered)return;
  var card=getRandomCards(2,5);
  var commenter=post.from==='我'?c.name:'我';
  post.comments.push({from:commenter,text:card,time:Date.now()});
  post.commentDelivered=true;
  saveAll();if($('moments-overlay').classList.contains('open')) renderMoments();
}

function checkPendingComments(){
  var c=getActiveChar();if(!c||!c.moments)return;
  var now=Date.now();
  for(var i=0;i<c.moments.length;i++){
    var p=c.moments[i];
    if(p.commentDue&&!p.commentDelivered&&now>=p.commentDue){
      deliverComment(p);
    }
  }
}

function maybeAutoPost(){
  var c=getActiveChar();if(!c||!c.moments)return;
  var lastPost=0;
  for(var i=c.moments.length-1;i>=0;i--){if(c.moments[i].from!=='我'){lastPost=c.moments[i].time;break;}}
  var dayMs=86400000,elapsed=Date.now()-lastPost;

}

function addCharacter(){

function deleteCharacter(cid){

  for(var i=0;i<characters.length;i++){if(characters[i].id===cid){characters.splice(i,1);break;}}

  updateHeader();
  renderChat();
  renderCharDropdown();
  $('char-dropdown').classList.add('open');

}
function updateNavBadges(){
  var n=getUnreadCount(),b=document.getElementById('nav-mail-badge');
  if(b){if(n>0)b.classList.add('show');else b.classList.remove('show');}
}

// ===== EVENTS =====
function bindEvents(){
  // Nav
  var nc=document.getElementById('nav-chat');if(nc)nc.addEventListener('click',function(){setActiveNav(this);});
  var nm=document.getElementById('nav-mail');if(nm)nm.addEventListener('click',function(){setActiveNav(this);openMailbox();});
  var ncl=document.getElementById('nav-call');if(ncl)ncl.addEventListener('click',function(){
    setActiveNav(this);document.getElementById('nav-call-badge').classList.remove('show');
    if(callActive){/* already in call - focus or show minibar */if($('call-minibar').classList.contains('show'))restoreCall();}
    else{openCall();}
  });
  var nrp=document.getElementById('nav-redpack');if(nrp)nrp.addEventListener('click',function(){setActiveNav(this);document.getElementById('nav-redpack-badge').classList.remove('show');openRedpack('to');});
  var nmo=document.getElementById('nav-moments');if(nmo)nmo.addEventListener('click',function(){setActiveNav(this);document.getElementById('nav-moments-badge').classList.remove('show');openMoments();maybeAutoPost();});
  var ns=document.getElementById('nav-settings');if(ns)ns.addEventListener('click',function(){setActiveNav(this);openSettings();});
  // Send
  $('send-btn').addEventListener('click',sendText);
  $('msg-input').addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText();}
  });
  // Auto-resize textarea
  $('msg-input').addEventListener('input',function(){
    this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';
  });
  
  // Voice button
  $('voice-btn').addEventListener('click',function(){toast('🎤 语音功能开发中');});
  
  // Image button
  $('image-btn').addEventListener('click',function(){$('image-input').click();});
  $('image-input').addEventListener('change',function(e){
    var file=e.target.files[0];if(file){sendImage(file);e.target.value='';}
  });
  
  // Emoji panel
  $('emoji-btn').addEventListener('click',toggleEmojiPanel);
  $('emoji-batch-input').addEventListener('change',function(){uploadEmojis(this.files);});
  $('emoji-panel').addEventListener('click',function(e){
    var tab=e.target.closest('.emoji-tab');
    if(tab){
      document.querySelectorAll('.emoji-tab').forEach(function(t){t.classList.toggle('active',t===tab);});
      renderEmojiContent();
      return;
    }
    // Handle delete emoji FIRST (before send)
    var del=e.target.closest('.emoji-del');
    if(del){
      e.stopPropagation();
      var parent=del.closest('.emoji-item');
      if(parent&&parent.dataset.eidx!==undefined){
        deleteEmoji(parseInt(parent.dataset.eidx));
      }
      return;
    }
    // Handle emoji item click
    var item=e.target.closest('.emoji-item');
    if(item){
      if(item.dataset.eidx!==undefined){
        var ei=parseInt(item.dataset.eidx);
        if(customEmojis[ei]) sendEmoji(customEmojis[ei].data);
        return;
      }
      if(item.dataset.emoji){
        sendEmoji(item.dataset.emoji);
        return;
      }
      if(item.classList.contains('emoji-add')) return;
    }
  });
  
  // Mobile sidebar toggle
  var sbt=document.getElementById('sidebar-toggle-btn');
  if(sbt)sbt.addEventListener('click',function(){$('sidebar').classList.toggle('open');});

  // Character dropdown
  $('header-info').addEventListener('click',function(e){
    e.stopPropagation();
    toggleCharDropdown();
  });
  $('char-dropdown').addEventListener('click',function(e){
    var item=e.target.closest('.char-item');
    if(!item)return;
    var cid=item.dataset.cid;
    if(cid){switchCharacter(parseInt(cid));return;}
    var del=e.target.closest('.char-item-del');
    if(del){deleteCharacter(parseInt(del.dataset.del));return;}
    if(item.id==='char-add-btn'){addCharacter();return;}
  });
  document.addEventListener('click',function(){$('char-dropdown').classList.remove('open');});

  // Close sidebar on outside click (mobile)
  document.addEventListener('click',function(e){
    var sb=$('sidebar');if(!sb||!sb.classList.contains('open'))return;
    if(!sb.contains(e.target)){sb.classList.remove('open');}
  });
  
  // Overlay close handlers
  $('mail-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
  $('settings-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
  $('import-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

  // Call minibar drag (ref: wanwanxuan.github.io)
  var mb=$('call-minibar'),mbOn=false,mbDragged=false,mbOffX=0,mbOffY=0;
  mb.addEventListener('pointerdown',function(e){
    if(e.target.closest('.cm-hangup'))return;
    e.preventDefault();mbOn=true;mbDragged=false;
    var r=mb.getBoundingClientRect();
    mbOffX=e.clientX-r.left;mbOffY=e.clientY-r.top;
    mb.style.left=r.left+'px';mb.style.top=r.top+'px';
    mb.style.width=r.width+'px';mb.style.right='auto';mb.style.bottom='auto';
    mb.style.transform='none';mb.style.transition='none';
    mb.classList.add('dragging');
    try{mb.setPointerCapture(e.pointerId);}catch(_){}
  });
  mb.addEventListener('pointermove',function(e){
    if(!mbOn)return;e.preventDefault();
    mbDragged=true;
    mb.style.left=Math.max(0,Math.min(window.innerWidth-mb.offsetWidth,e.clientX-mbOffX))+'px';
    mb.style.top=Math.max(0,Math.min(window.innerHeight-mb.offsetHeight,e.clientY-mbOffY))+'px';
  });
  function mbStop(e){
    if(!mbOn)return;mbOn=false;
    if(!mbDragged&&!e.target.closest('.cm-hangup'))restoreCall();
    mb.classList.remove('dragging');
    try{mb.releasePointerCapture(e.pointerId);}catch(_){}
  }
  mb.addEventListener('pointerup',mbStop);
  mb.addEventListener('pointercancel',mbStop);
  
  // Scroll to bottom
  // Redpack accept/reject in chat
  $('chat-area').addEventListener('click',function(e){
    var accept=e.target.closest('.rp-accept-btn');
    var reject=e.target.closest('.rp-reject-btn');
    if(!accept&&!reject)return;
    e.stopPropagation();
    var rid=parseInt((accept||reject).dataset.rid);
    var c=getActiveChar();if(!c)return;
    for(var i=0;i<c.chatHistory.length;i++){
      if(c.chatHistory[i].id===rid){
        if(accept){
          c.chatHistory[i].status='accepted';
          c.chatHistory[i].reply=getRandomCard();
          addMessage('text','谢谢宝贝的红包~ '+c.chatHistory[i].reply,'me');
        }else{
          c.chatHistory[i].status='rejected';
          addMessage('text','红包已退还', 'me');
        }
        saveAll();renderChat();break;
      }
    }
    // Message quote: click bubble to quote
    var bubble=e.target.closest('.msg-bubble');
    if(bubble&&!accept&&!reject){
      var row=bubble.closest('.msg-row');
      var text=bubble.textContent.trim();
      if(text&&row){
        var sender=row.classList.contains('me')?'我':(getActiveChar()||{}).name||'对方';
        $('msg-input').value='> '+sender+': '+text+'\n';
        $('msg-input').focus();
        $('msg-input').style.height='auto';$('msg-input').style.height=Math.min($('msg-input').scrollHeight,100)+'px';
      }
      return;
    }
  });
  $('chat-area').addEventListener('scroll',function(){
    var a=this,btn=$('scroll-bottom-btn');
    if(a.scrollHeight-a.scrollTop-a.clientHeight>200){btn.classList.add('show');}else{btn.classList.remove('show');}
  });
  $('scroll-bottom-btn').addEventListener('click',scrollToBottom);
  
  // System theme change
  window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(){
    if(settings.theme==='auto')applyTheme();
  });
  
  // Keyboard shortcut
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'){
      closeEmojiPanel();
      $('settings-overlay').classList.remove('open');
      $('import-overlay').classList.remove('open');
      $('sidebar').classList.remove('open');
    }
    if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();$('msg-input').focus();}
  });
}

// Error reporter
window.onerror=function(msg,url,line){toast('⚠️ 错误: '+msg+' (行'+line+')');return false;};

// ===== START =====
init();
</script>
</body>
</html>
